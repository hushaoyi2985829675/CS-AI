<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a73e8" />
  <title>WeightLossApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    #root { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (function() {
      var script = document.createElement('script');
      script.src = 'http://localhost:19006/index.bundle?platform=web&dev=true&hot=false';
      script.async = true;
      script.onerror = function() {
        document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center;color:#e53935;"><h2>加载失败</h2><p>无法连接到 Metro Bundler (localhost:19006)</p><p>请确保 Metro Bundler 正在运行</p></div>';
      };
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
